<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Profile</title>
    <link rel="stylesheet" href="style.css" />
    <script src="index.js" defer></script>
</head>

<body>

    <!-- HEADER -->
    <header class="header">
        <h1 id="heading-1">Lokesh Jha</h1>
        <p>Software Developer</p>
    </header>

    <!-- ABOUT -->
    <section class="card">
        <h2>About Me</h2>
        <p>I am a backend developer with experience in Node.js.</p>
    </section>

    <!-- CONTACT FORM -->
    <section id="form-req" class="card">
        <h2>Contact Me</h2>

        <form id="contact-form">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" />
            </div>

            <div class="form-group">
                <label for="name">Name</label>
                <input type="text" id="name" name="name" />
            </div>

            <button type="submit">Send</button>
        </form>
    </section>

    <!-- INLINE VS BLOCK DEMO -->
    <section class="card">
        <h2>Inline vs Block</h2>

        <span>Hi There</span>
        <span>Hi There</span>

        <div>Hi There..</div>
        <div>Hi There..</div>

        <p>Yellow</p>
        <p>Yellow</p>
    </section>

    <!-- GRID DEMO -->
    <section class="card">
        <h2>Grid Demo</h2>

        <div class="grid-demo">
            <div>1</div>
            <div>2</div>
            <div>3</div>
            <div>4</div>
            <div>5</div>
            <div>6</div>
        </div>
    </section>

    <!-- FOOTER -->
    <footer>
        <p>© 2026 Lokesh</p>
    </footer>

</body>

</html>
